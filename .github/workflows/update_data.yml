name: 🔍 CI — Validate App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Syntax & import check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas numpy scipy scikit-learn plotly streamlit openpyxl --quiet

      - name: Check app.py syntax
        run: python3 -c "import ast; ast.parse(open('app.py').read()); print('✅ app.py sintaxis OK')"

      - name: Check src modules import
        run: |
          python3 -c "
          import sys; sys.path.insert(0, '.')
          mods = [
              'src.loader', 'src.metrics', 'src.optimizer', 'src.covariance',
              'src.clustering', 'src.hrp', 'src.backtesting', 'src.bootstrap',
              'src.rolling', 'src.stress_hipotetico', 'src.benchmarks',
          ]
          for m in mods:
              __import__(m)
              print(f'  ✅ {m}')
          print('Todos los módulos OK')
          "

      - name: Check scraper syntax
        run: python3 -c "import ast; ast.parse(open('scripts/fetch_investing.py').read()); print('✅ scraper sintaxis OK')"
