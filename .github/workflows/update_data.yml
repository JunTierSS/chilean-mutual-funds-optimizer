name: 📊 Update Fund Data

on:
  schedule:
    # Lunes a viernes a las 20:00 UTC = 16:00 hora Chile (después del cierre)
    - cron: '0 20 * * 1-5'
  workflow_dispatch:
    # Permite ejecutar manualmente desde GitHub Actions UI
    inputs:
      broker:
        description: 'Broker a actualizar (all / bci / bice / bancochile / security)'
        required: false
        default: 'all'
      dry_run:
        description: 'Dry run (no guardar archivos)'
        type: boolean
        required: false
        default: false

jobs:
  update-fund-data:
    name: Fetch & commit fund data
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesario para hacer push al repo

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install requests pandas lxml html5lib --quiet

      - name: 🔄 Run scraper
        run: |
          BROKER="${{ github.event.inputs.broker || 'all' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          if [ "$DRY_RUN" = "true" ]; then
            python3 scripts/fetch_investing.py --broker "$BROKER" --dry-run
          else
            python3 scripts/fetch_investing.py --broker "$BROKER"
          fi
        continue-on-error: true   # no falla el workflow si el scraper tiene errores parciales

      - name: 🔍 Check for new data
        id: changes
        run: |
          git diff --quiet data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 💾 Commit and push if data changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          FECHA=$(date +'%Y-%m-%d')
          N_FILES=$(git diff --cached --name-only | wc -l | tr -d ' ')
          git commit -m "chore: update fund data ${FECHA} (${N_FILES} archivos)"
          git push

      - name: ℹ️ No changes
        if: steps.changes.outputs.changed == 'false'
        run: echo "✅ Datos ya actualizados — sin cambios que commitear"
